<style>
  #uie-chatbox-window{
    position: fixed;
    right: 20px;
    bottom: 20px;
    left: auto;
    top: auto;
    transform: none;
    width: min(731px, 96vw);
    height: min(900px, 90vh);
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 9999;
    font-family: sans-serif;
  }
  @media not all {
    #uie-chatbox-window{
      right: 0;
      left: 0;
      bottom: 0;
      width: 100vw;
      height: 78vh;
      border-radius: 20px 20px 0 0;
    }
  }
</style>

<div id="uie-chatbox-window" class="uie-window" style="display:none; background:rgba(16, 20, 26, 0.95); backdrop-filter: blur(4px); border:1px solid rgba(255,255,255,0.1);">
  
  <!-- Header -->
  <div class="uie-header" style="padding: 12px 16px; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:space-between; background:rgba(255,255,255,0.02);">
    <div class="uie-info">
      <h2 style="margin:0; font-size:16px; font-weight:800; color:#eee; letter-spacing:0.5px;">CHATBOX</h2>
    </div>
    <div class="uie-controls" style="display:flex; gap:8px; align-items:center;">
      <i class="fa-solid fa-circle-question" onclick="uie.phone.openBooksGuide('guide-chatbox')" title="Help / Guide" style="color:#ccc; cursor:pointer; margin-right:5px;"></i>
      <select id="uie-chatbox-theme" style="height:28px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); color:#ccc; font-size:12px; padding:0 8px; outline:none;">
        <option value="visual_novel">Visual Novel</option>
        <option value="rpg">RPG</option>
        <option value="magic_shop">Magic Shop</option>
        <option value="classroom">Classroom</option>
      </select>
      <button id="uie-chatbox-gear" title="Options" style="height:28px; width:28px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); color:#ccc; cursor:pointer; display:grid; place-items:center;"><i class="fa-solid fa-gear" style="font-size:14px;"></i></button>
      <button id="uie-chatbox-close" title="Close" style="height:28px; width:28px; border-radius:8px; border:1px solid rgba(255,255,100,0.1); background:rgba(255,100,100,0.1); color:#ffaaaa; cursor:pointer; display:grid; place-items:center;"><i class="fa-solid fa-xmark" style="font-size:16px;"></i></button>
    </div>
  </div>

  <!-- Content Area -->
  <div style="display:flex; flex-direction:column; min-height:0; flex:1; position:relative;">
    
    <!-- Top Bar (Search & Tools) -->
    <div id="uie-chatbox-topbar" style="padding:8px 12px; display:flex; gap:8px; align-items:center;">
      <div style="position:relative; flex:1;">
        <input id="uie-chatbox-search" type="text" placeholder="Search..." style="width:100%; height:32px; border-radius:16px; border:1px solid rgba(255,255,255,0.08); background:rgba(0,0,0,0.2); color:#fff; padding:0 30px 0 12px; font-size:13px; outline:none;">
        <button id="uie-chatbox-search-clear" style="position:absolute; right:4px; top:4px; height:24px; width:24px; border:none; background:none; color:#aaa; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center;">x</button>
      </div>
      <div style="display:flex; gap:4px;">
        <button id="uie-chatbox-open-inv" title="Inventory" style="height:32px; width:32px; border-radius:10px; border:none; background:rgba(255,255,255,0.05); color:#cba35c; cursor:pointer;"><i class="fa-solid fa-box-open"></i></button>
        <button id="uie-chatbox-open-map" title="Map" style="height:32px; width:32px; border-radius:10px; border:none; background:rgba(255,255,255,0.05); color:#3498db; cursor:pointer;"><i class="fa-solid fa-map"></i></button>
      </div>
    </div>

    <div id="uie-chatbox-banner" style="display:none; padding:8px 12px; background:rgba(231,76,60,0.15); color:#ffb4aa; font-size:12px; text-align:center;"></div>

    <!-- Message List -->
    <div id="uie-chatbox-list" class="custom-scroll" style="flex:1; min-height:0; overflow-y:auto; overflow-x:hidden; padding:12px 16px;"></div>

    <!-- Composer Area -->
    <div id="uie-chatbox-composer-wrap" style="padding:12px; background:rgba(0,0,0,0.2); border-top:1px solid rgba(255,255,255,0.05);">
      <div id="uie-chatbox-composer" style="display:flex; flex-direction:column; gap:8px;"></div>
    </div>
  </div>

  <!-- Options Overlay -->
  <div id="uie-chatbox-options" style="display:none; position:absolute; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(5px); z-index:100; align-items:center; justify-content:center; padding:20px;">
    <div class="custom-scroll" style="width:100%; max-width:380px; max-height:85vh; overflow-y:auto; background:#1b202b; border:1px solid #333; border-radius:16px; padding:20px; color:#fff; box-shadow:0 20px 50px rgba(0,0,0,0.5);">
      <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <h3 style="margin:0; font-size:16px; color:#eee;">Chatbox Options</h3>
        <button id="uie-chatbox-options-close" style="background:none; border:none; color:#888; cursor:pointer; font-size:18px;"><i class="fa-solid fa-xmark"></i></button>
      </div>

      <div style="margin-bottom:15px;">
        <label style="display:block; font-size:12px; color:#888; margin-bottom:6px;">Text Size</label>
        <input id="uie-chatbox-textscale" type="range" min="0.85" max="1.35" step="0.01" style="width:100%;">
      </div>

      <div style="margin-bottom:15px;">
        <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
          <input id="uie-chatbox-contrast" type="checkbox">
          <span style="font-size:14px;">High Contrast Mode</span>
        </label>
      </div>

      <div style="margin-bottom:15px;">
        <label style="display:block; font-size:12px; color:#888; margin-bottom:6px;">Background Image URL</label>
        <input id="uie-chatbox-bg" type="text" placeholder="https://..." style="width:100%; padding:8px; border-radius:8px; border:1px solid #333; background:#111; color:#fff; font-size:12px;">
      </div>

      <!-- Character Chat Boxes Styling Section -->
      <div style="margin-bottom:15px; border-top:1px solid rgba(255,255,255,0.08); padding-top:15px;">
        <h4 style="margin:0 0 12px; font-size:14px; color:#e08838; font-weight:800; text-transform:uppercase; letter-spacing:0.5px;">Character Chat Boxes</h4>
        
        <div style="margin-bottom:10px;">
          <label style="display:block; font-size:11px; color:#b8c0cc; margin-bottom:4px; font-weight:700;">Default Box Color</label>
          <input id="uie-sw-speaker-bg-color" type="color" value="#fff1c7" style="width:100%; height:34px; padding:2px; border:1px solid #333; border-radius:6px; background:#111; cursor:pointer; box-sizing:border-box;">
        </div>
        
        <div style="margin-bottom:10px;">
          <label style="display:block; font-size:11px; color:#b8c0cc; margin-bottom:4px; font-weight:700;">Default Font Color</label>
          <input id="uie-sw-speaker-text-color" type="color" value="#3e2723" style="width:100%; height:34px; padding:2px; border:1px solid #333; border-radius:6px; background:#111; cursor:pointer; box-sizing:border-box;">
        </div>
        
        <div style="margin-bottom:10px;">
          <label style="display:block; font-size:11px; color:#b8c0cc; margin-bottom:4px; font-weight:700;">Default Accent Color</label>
          <input id="uie-sw-speaker-accent-color" type="color" value="#8e5431" style="width:100%; height:34px; padding:2px; border:1px solid #333; border-radius:6px; background:#111; cursor:pointer; box-sizing:border-box;">
        </div>
        
        <div style="margin-bottom:10px;">
          <label style="display:block; font-size:11px; color:#b8c0cc; margin-bottom:4px; font-weight:700;">Default Dialogue Font</label>
          <select id="uie-sw-speaker-font" style="width:100%; height:34px; padding:6px; border-radius:6px; border:1px solid #333; background:#111; color:#fff; font-size:12px; outline:none; box-sizing:border-box;"></select>
        </div>
      </div>

      <!-- Launcher / Gear Menu Styling Section -->
      <div style="margin-bottom:20px; border-top:1px solid rgba(255,255,255,0.08); padding-top:15px;">
        <h4 style="margin:0 0 12px; font-size:14px; color:#e08838; font-weight:800; text-transform:uppercase; letter-spacing:0.5px;">Launcher / Gear Menu</h4>
        
        <div style="margin-bottom:10px;">
          <label style="display:block; font-size:11px; color:#b8c0cc; margin-bottom:4px; font-weight:700;">Launcher Name</label>
          <input id="uie-launcher-name" type="text" placeholder="Menu" style="width:100%; height:34px; padding:8px; border-radius:6px; border:1px solid #333; background:#111; color:#fff; font-size:12px; box-sizing:border-box; outline:none;">
        </div>
        
        <div style="margin-bottom:10px;">
          <label style="display:block; font-size:11px; color:#b8c0cc; margin-bottom:4px; font-weight:700;">Gear / Launcher Orange</label>
          <input id="uie-launcher-color" type="color" value="#9f4f1f" style="width:100%; height:34px; padding:2px; border:1px solid #333; border-radius:6px; background:#111; cursor:pointer; box-sizing:border-box;">
        </div>
        
        <div style="margin-bottom:10px;">
          <label style="display:block; font-size:11px; color:#b8c0cc; margin-bottom:4px; font-weight:700;">Launcher Icon</label>
          <select id="uie-launcher-icon" style="width:100%; height:34px; padding:6px; border-radius:6px; border:1px solid #333; background:#111; color:#fff; font-size:12px; box-sizing:border-box; outline:none;">
            <option value="custom">Custom Upload</option>
            <option value="https://user.uploads.dev/file/081cbcc0d71cbdfa35ec4465b10de41e.png">TM</option>
            <option value="https://user.uploads.dev/file/46e20ac002586b8bef879905ce564c75.png">Shield & Crow</option>
            <option value="https://user.uploads.dev/file/a9cef63039cb7c9fe2950b2a279e486d.png">Fantasy Scroll</option>
            <option value="https://user.uploads.dev/file/b3fc92e1b70f0c8f0c200b544f7a4cce.png">Adventure Pack</option>
            <option value="https://user.uploads.dev/file/b2121592871d90a03dd246f41f8fe452.png">Sword</option>
          </select>
        </div>
        
        <div style="margin-bottom:10px;">
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; font-weight:700; color:#b8c0cc; margin-top:12px;">
            <input id="uie-hide-settings" type="checkbox" style="accent-color:#e08838; width:16px; height:16px;">
            <span>Hide Settings buttons</span>
          </label>
        </div>
      </div>

      <div style="display:flex; gap:10px;">
        <button id="uie-chatbox-options-save" style="flex:1; padding:10px; border-radius:8px; border:none; background:#cd7f32; color:#000; font-weight:bold; cursor:pointer;">Save</button>
        <button id="uie-chatbox-options-reset" style="flex:1; padding:10px; border-radius:8px; border:1px solid #333; background:transparent; color:#ccc; cursor:pointer;">Reset</button>
      </div>
    </div>
  </div>
</div>
