<style>
  #uie-databank-window{ top: 80px; left: 80px; transform:none; flex-direction: column !important; overflow: hidden; background:#fff !important; color:#172033 !important; border:1px solid #d9e1ec !important; box-shadow:0 18px 50px rgba(15,23,42,.18) !important; }
  #uie-databank-window .uie-header{ background:#f8fafc !important; color:#172033 !important; border-bottom:1px solid #d9e1ec !important; }
  #uie-databank-window .uie-content, #uie-databank-window .uie-db-panel{ background:#fff !important; color:#172033 !important; }
  #uie-databank-window .uie-db-tab{ background:#f1f5f9 !important; color:#334155 !important; border-color:#d9e1ec !important; }
  #uie-databank-window .uie-db-tab.active{ background:#fff !important; color:#0f172a !important; border-bottom-color:#0ea5e9 !important; }
  #uie-databank-window input,
  #uie-databank-window textarea,
  #uie-databank-window select{
    background:#fff !important;
    color:#172033 !important;
    border-color:#cbd5e1 !important;
    color-scheme:light !important;
  }
  #uie-databank-window button{
    background:#f8fafc !important;
    color:#172033 !important;
    border-color:#cbd5e1 !important;
    box-shadow:none !important;
  }
  #uie-databank-window [style*="background:rgba(0,0,0"],
  #uie-databank-window [style*="background:#0b101c"],
  #uie-db-social-mem-overlay > div{
    background:#fff !important;
    color:#172033 !important;
    border-color:#d9e1ec !important;
  }
  #uie-databank-window .uie-header{ height: 32px !important; min-height: 32px !important; padding: 0 8px !important; flex-shrink: 0 !important; display: flex !important; align-items: center !important; z-index: 10 !important; font-size: 0.9em !important; }
  #uie-databank-window .uie-header h2{ font-size: 1.1em !important; margin: 0 !important; line-height: 1 !important; }
  #uie-databank-window .uie-db-tab{ display: flex; align-items: center; justify-content: center; flex: 1 1 0 !important; min-width: 0 !important; padding: 7px 11px !important; font-size: 13px !important; line-height: 1.1 !important; white-space: nowrap !important; overflow: hidden !important; text-overflow: ellipsis !important; }
  #uie-db-tabs{ display:flex; flex-direction: row !important; align-items: center; flex: 0 0 auto; width: 100%; gap: 0 !important; padding: 0 !important; }
  #uie-databank-window .uie-content{ flex: 1 1 auto; min-height: 0; }
  #uie-db-social-mem-overlay{
    align-items: center;
    justify-content: center;
    padding: 14px;
    box-sizing: border-box;
  }
  #uie-db-social-mem-overlay > div{
    width: min(760px, 100%);
    max-height: calc(100vh - 28px);
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }
  @media not all {
    #uie-databank-window {
      inset: 0 !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100dvh !important;
      max-width: 100vw !important;
      max-height: 100dvh !important;
      border-radius: 0 !important;
      transform: none !important;
    }
    #uie-databank-window .uie-header {
      height: 54px !important;
      min-height: 54px !important;
      padding: 0 12px !important;
      font-size: 1em !important;
    }
    #uie-databank-window .uie-header h2 {
      font-size: 18px !important;
      letter-spacing: 1px !important;
    }
    #uie-db-tabs {
      gap: 8px !important;
      padding: 8px 10px !important;
      overflow-x: auto !important;
      scrollbar-width: none !important;
    }
    #uie-db-tabs::-webkit-scrollbar {
      display: none !important;
    }
    #uie-databank-window .uie-db-tab {
      flex: 0 0 auto !important;
      min-width: max-content !important;
      min-height: 44px !important;
      padding: 0 14px !important;
      border: 1px solid rgba(0,240,255,0.22) !important;
      border-radius: 10px !important;
      font-size: 12px !important;
      text-overflow: clip !important;
    }
    #uie-databank-window .uie-content {
      height: auto !important;
      min-height: 0 !important;
      overflow: auto !important;
    }
    #uie-db-view-memories,
    #uie-db-view-social,
    #uie-db-view-state {
      padding: 12px !important;
    }
    #uie-db-view-memories > div,
    #uie-db-view-social > div,
    #uie-db-view-state > div {
      max-width: 100% !important;
    }
    #uie-db-view-social > div:first-child {
      display: grid !important;
      grid-template-columns: 1fr !important;
      gap: 10px !important;
    }
    #uie-db-social-mem-overlay {
      padding: 0;
    }
    #uie-db-social-mem-overlay > div {
      width: 100vw !important;
      height: 100dvh !important;
      max-height: 100dvh !important;
      border-radius: 0 !important;
      padding: 14px !important;
    }
  }
</style>
<div id="uie-databank-window" class="uie-window" style="display:none; width:450px; height:600px; background:#fff; color:#172033; border:1px solid #d9e1ec; box-shadow:0 18px 50px rgba(15,23,42,.18);">
    <div class="uie-header" style="border-bottom:1px solid #00f0ff; padding:12px; display:flex; align-items:center; background:rgba(0,240,255,0.1);">
        <i class="fa-solid fa-database" style="margin-right:8px;"></i>
        <h2 style="margin:0; font-size:16px; letter-spacing:2px;">DATABANK</h2>
        <i class="fa-solid fa-circle-question" onclick="uie.phone.openBooksGuide('guide-journal')" style="margin-left:auto; margin-right:10px; cursor:pointer; font-size:16px;" title="Help"></i>
        <i id="uie-databank-close" class="fa-solid fa-xmark uie-close-btn" style="cursor:pointer; font-size:18px;"></i>
    </div>
    
    <div id="uie-db-tabs" style="display:flex; border-bottom:1px solid rgba(0,240,255,0.3); gap:0; padding:0; overflow-x:auto; overflow-y:hidden; white-space:nowrap;">
        <div class="uie-db-tab active" data-tab="memories" style="flex:1 1 0; min-width:0; text-align:center; cursor:pointer; font-weight:bold; background:rgba(0,240,255,0.1); border-right:1px solid rgba(0,240,255,0.1);">MEMORIES</div>
        <div class="uie-db-tab" data-tab="social" style="flex:1 1 0; min-width:0; text-align:center; cursor:pointer; font-weight:bold; color:rgba(0,240,255,0.5); border-right:1px solid rgba(0,240,255,0.1);">SOCIAL</div>
        <div class="uie-db-tab" data-tab="state" style="flex:1 1 0; min-width:0; text-align:center; cursor:pointer; font-weight:bold; color:rgba(0,240,255,0.5);">WORLD STATE</div>
    </div>

    <div class="uie-content" style="padding:0; overflow-y:auto; flex:1; min-height:0;">
        <!-- MEMORIES VIEW -->
        <div id="uie-db-view-memories" style="padding:15px;">
            <div style="display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-end; align-items:center; margin-bottom:10px;">
                <button id="uie-db-scan" style="background:rgba(0,240,255,0.1); border:1px solid #00f0ff; color:#00f0ff; padding:6px 12px; cursor:pointer; font-weight:bold; font-size:12px; display:flex; align-items:center; gap:6px;">
                    <i class="fa-solid fa-brain"></i> ARCHIVE RECENT
                </button>
            </div>
            <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:12px; padding:10px; border-radius:6px; border:1px solid rgba(0,240,255,0.22); background:rgba(0,240,255,0.04);">
                <span style="font-size:11px; font-weight:800; color:rgba(0,240,255,0.85); letter-spacing:0.5px;">RANGE</span>
                <label style="font-size:11px; color:rgba(0,240,255,0.75); display:flex; align-items:center; gap:6px;">From <input id="uie-db-range-start" type="number" min="1" step="1" placeholder="1" style="width:64px; background:rgba(0,0,0,0.35); border:1px solid rgba(0,240,255,0.35); color:#fff; padding:4px 6px; border-radius:4px;"></label>
                <label style="font-size:11px; color:rgba(0,240,255,0.75); display:flex; align-items:center; gap:6px;">To <input id="uie-db-range-end" type="number" min="1" step="1" placeholder="last" style="width:64px; background:rgba(0,0,0,0.35); border:1px solid rgba(0,240,255,0.35); color:#fff; padding:4px 6px; border-radius:4px;"></label>
                <button id="uie-db-scan-range" type="button" style="background:rgba(0,240,255,0.14); border:1px solid #00f0ff; color:#00f0ff; padding:6px 12px; cursor:pointer; font-weight:bold; font-size:11px; display:flex; align-items:center; gap:6px;">
                    <i class="fa-solid fa-bookmark"></i> ARCHIVE RANGE
                </button>
            </div>
            <div id="uie-db-meta" style="font-size:11px; color:rgba(0,240,255,0.65); margin:-6px 0 10px; letter-spacing:0.6px;"></div>
            <div id="uie-db-list"></div>
        </div>

        <!-- STATE VIEW -->
        <div id="uie-db-view-state" style="display:none; padding:15px;">
            <div style="display:flex; justify-content:flex-end; margin-bottom:10px;">
                <button id="uie-db-state-scan" style="background:rgba(0,240,255,0.1); border:1px solid #00f0ff; color:#00f0ff; padding:6px 12px; cursor:pointer; font-weight:bold; font-size:12px; display:flex; align-items:center; gap:6px;">
                    <i class="fa-solid fa-arrows-rotate"></i> SCAN / REFRESH
                </button>
            </div>
            <div id="uie-db-state-content"></div>
        </div>

        <!-- SOCIAL VIEW -->
        <div id="uie-db-view-social" style="display:none; padding:15px;">
            <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
                <input id="uie-db-social-search" type="text" placeholder="Search profiles..." style="flex:1; background:rgba(0,0,0,0.25); border:1px solid rgba(0,240,255,0.3); color:#fff; padding:8px 10px; outline:none;">
                <button id="uie-db-social-scan" style="background:rgba(0,240,255,0.1); border:1px solid #00f0ff; color:#00f0ff; padding:8px 10px; cursor:pointer; font-weight:900; font-size:11px; display:flex; align-items:center; gap:6px; white-space:nowrap;">
                    <i class="fa-solid fa-arrows-rotate"></i> SCAN MEMORIES
                </button>
            </div>
            <div id="uie-db-social-list"></div>
        </div>
    </div>
</div>

<div id="uie-db-social-mem-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:10080; align-items:center; justify-content:center; padding:14px; box-sizing:border-box;">
    <div style="position:relative; width:min(760px,100%); max-height:calc(100vh - 28px); overflow-y:auto; overflow-x:hidden; background:#fff; color:#172033; border:1px solid #d9e1ec; box-shadow:0 18px 50px rgba(15,23,42,.18); padding:14px;">
        <div style="display:flex; align-items:center; gap:10px;">
            <div style="font-weight:900; letter-spacing:1px; color:#00f0ff;">SOCIAL MEMORIES</div>
            <div id="uie-db-social-mem-sub" style="margin-left:auto; font-size:12px; color:rgba(0,240,255,0.65);"></div>
            <i class="fa-solid fa-xmark" id="uie-db-social-mem-close" style="cursor:pointer; color:#00f0ff;"></i>
        </div>
        <div style="display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;">
            <button id="uie-db-social-mem-scan" style="background:rgba(0,240,255,0.1); border:1px solid rgba(0,240,255,0.35); color:#00f0ff; padding:6px 10px; cursor:pointer; font-weight:900; font-size:12px;">SCAN FROM CHAT</button>
            <button id="uie-db-social-mem-add" style="background:rgba(0,240,255,0.1); border:1px solid rgba(0,240,255,0.35); color:#00f0ff; padding:6px 10px; cursor:pointer; font-weight:900; font-size:12px;">ADD</button>
            <button id="uie-db-social-mem-inject" style="background:rgba(0,240,255,0.1); border:1px solid rgba(0,240,255,0.35); color:#00f0ff; padding:6px 10px; cursor:pointer; font-weight:900; font-size:12px;">INJECT TO CHAT</button>
            <button id="uie-db-social-mem-clear" style="background:rgba(255,59,48,0.10); border:1px solid rgba(255,59,48,0.35); color:#ff3b30; padding:6px 10px; cursor:pointer; font-weight:900; font-size:12px;">CLEAR</button>
        </div>
        <div id="uie-db-social-mem-list" style="margin-top:12px;"></div>
        <div id="uie-db-social-mem-empty" style="display:none; text-align:center; color:rgba(0,240,255,0.55); margin-top:18px;">NO MEMORIES SAVED</div>
    </div>
</div>
