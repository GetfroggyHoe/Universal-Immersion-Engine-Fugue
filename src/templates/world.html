<div id="uie-world-window" class="uie-window" style="display:none;">
    <style>
        #uie-world-window {
            position: fixed;
            flex-direction: column !important;
            top: 15vh;
            left: 15vw;
            transform: none;
            width: min(520px, 90vw);
            max-width: 90vw;
            height: min(650px, 80vh);
            max-height: 80vh;
            display: flex;
            background:#fff !important;
            border:1px solid #dbe2ea;
            border-radius:12px;
            box-shadow:0 20px 60px rgba(15,23,42,.18);
            z-index: 20035;
            font-family: 'Outfit', 'Inter', system-ui, sans-serif;
            color:#172033;
            overflow: hidden;
        }
        #uie-world-window::before {
            content: "";
            position: absolute;
            inset: 0;
            background:linear-gradient(135deg,rgba(45,108,223,.05),transparent 42%);
            pointer-events: none;
            z-index: 0;
            border-radius: 16px;
        }
        #uie-world-window > * { position: relative; z-index: 1; }
        @media not all {
            #uie-world-window {
                top: 6vh !important;
                left: 4vw !important;
                width: 92vw !important;
                max-width: 92vw !important;
                height: 87vh !important;
                max-height: 87vh !important;
            }
        }
        #uie-world-window .uie-header {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom:1px solid #e2e7ee;
            background:#f8fafc;
        }
        #uie-world-window .uie-header h2 { margin:0; font-size:1.2em; color:#172033; font-weight:800; letter-spacing:.5px; }
        #uie-world-window .uie-close-btn { cursor: pointer; font-size: 1.2em; opacity: 0.7; transition: all 0.2s ease; }
        #uie-world-window .uie-close-btn:hover { opacity: 1; color: #e74c3c; transform: scale(1.1); }
        
        #uie-world-window .uie-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color:#94a3b8 #eef2f6;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        #uie-world-window .uie-content::-webkit-scrollbar { width: 6px; }
        #uie-world-window .uie-content::-webkit-scrollbar-track { background:#eef2f6; }
        #uie-world-window .uie-content::-webkit-scrollbar-thumb { background:#94a3b8; border-radius:8px; }

        .uie-world-gen-box {
            background:#fff;
            border:1px solid #e2e7ee;
            padding: 16px;
            border-radius: 12px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow:0 6px 16px rgba(15,23,42,.05);
        }
        .uie-world-input-group {
            display: flex;
            gap: 10px;
        }
        .uie-world-input-group input {
            flex: 1;
            height: 42px;
            background:#fff;
            border:1px solid #cbd5e1;
            color:#172033;
            padding: 0 12px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .uie-world-input-group input:focus {
            border-color: rgba(99, 102, 241, 0.6);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.25);
            outline: none;
        }
        .uie-world-btn {
            height: 42px;
            padding: 0 16px;
            border-radius: 8px;
            border: none;
            background:#172033;
            color:#fff;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow:0 4px 12px rgba(15,23,42,.16);
        }
        .uie-world-btn:hover {
            transform: translateY(-2px);
            box-shadow:0 6px 16px rgba(15,23,42,.24);
            filter: brightness(1.1);
        }
        .uie-world-btn:active {
            transform: translateY(0);
        }
        .uie-world-meta-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color:#667085;
            font-weight: 600;
        }
        .uie-world-meta-badge {
            background:#eef4ff;
            border:1px solid #cbdaf7;
            color:#2d6cdf;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>

    <div class="uie-header">
        <h2>World Simulation</h2>
        <div style="margin-left: auto; display: flex; gap: 12px; align-items: center;">
            <i class="fa-solid fa-rotate" id="uie-world-update" title="Scan / Update State" style="cursor:pointer; color:#2d6cdf; font-size:1.1em; transition:transform .3s ease;"></i>
            <i class="fa-solid fa-xmark uie-close-btn" id="uie-world-close" title="Close Panel"></i>
        </div>
    </div>

    <div class="uie-content">
        <!-- Render target for dynamic state elements -->
        <div id="uie-world-content"></div>

        <!-- World Generator controls -->
        <div class="uie-world-gen-box">
            <div class="uie-world-meta-row">
                <span>SIMULATION ID:</span>
                <span id="uie-world-id" class="uie-world-meta-badge">WAITING...</span>
            </div>
            <div style="font-size:13px; color:#334155; font-weight:600;">
                Change Location / Target Dimension
            </div>
            <div class="uie-world-input-group">
                <input type="text" id="uie-world-input" placeholder="e.g. Neo Tokyo Sector 7, Whispering Woods..." maxlength="80">
                <button type="button" id="uie-world-gen" class="uie-world-btn">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Project
                </button>
            </div>
            <div style="font-size:11px; color:#64748b; line-height:1.4;">
                Projecting to a new location triggers Reality Engine environment synthesis and generates a corresponding local backdrop.
            </div>
        </div>
    </div>
    
    <div style="text-align:center; padding:10px; color:#94a3b8; font-size:.75em; border-top:1px solid #e2e7ee; font-weight:700; letter-spacing:.5px;">
        REALITY PROJECTION UNIT v3.0
    </div>
</div>
