<div id="uie-world-window" class="uie-window" style="display:none;">
    <style>
        #uie-world-window {
            position: fixed;
            flex-direction: column !important;
            top: 15vh;
            left: 15vw;
            transform: none;
            width: min(520px, 90vw);
            max-width: 90vw;
            height: min(650px, 80vh);
            max-height: 80vh;
            display: flex;
            background: linear-gradient(155deg, rgba(16, 25, 46, 0.97), rgba(7, 12, 25, 0.98)) !important;
            border: 1px solid rgba(139, 184, 255, 0.28);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.85);
            z-index: 20035;
            font-family: 'Outfit', 'Inter', system-ui, sans-serif;
            color: #f6e7c8;
            overflow: hidden;
        }
        #uie-world-window::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 15% 0%, rgba(99, 102, 241, 0.15), transparent 42%);
            pointer-events: none;
            z-index: 0;
            border-radius: 16px;
        }
        #uie-world-window > * { position: relative; z-index: 1; }
        @media not all {
            #uie-world-window {
                top: 6vh !important;
                left: 4vw !important;
                width: 92vw !important;
                max-width: 92vw !important;
                height: 87vh !important;
                max-height: 87vh !important;
            }
        }
        #uie-world-window .uie-header {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
        }
        #uie-world-window .uie-header h2 { margin: 0; font-size: 1.2em; color: #e8f3ff; font-weight: 800; letter-spacing: 0.5px; }
        #uie-world-window .uie-close-btn { cursor: pointer; font-size: 1.2em; opacity: 0.7; transition: all 0.2s ease; }
        #uie-world-window .uie-close-btn:hover { opacity: 1; color: #e74c3c; transform: scale(1.1); }
        
        #uie-world-window .uie-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(139, 184, 255, 0.5) rgba(0, 0, 0, 0.2);
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        #uie-world-window .uie-content::-webkit-scrollbar { width: 6px; }
        #uie-world-window .uie-content::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        #uie-world-window .uie-content::-webkit-scrollbar-thumb { background: rgba(139, 184, 255, 0.5); border-radius: 8px; }

        .uie-world-gen-box {
            background: rgba(26, 34, 54, 0.6);
            border: 1px solid rgba(139, 184, 255, 0.15);
            padding: 16px;
            border-radius: 12px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: inset 0 1px 3px rgba(255, 255, 255, 0.05);
        }
        .uie-world-input-group {
            display: flex;
            gap: 10px;
        }
        .uie-world-input-group input {
            flex: 1;
            height: 42px;
            background: rgba(10, 15, 28, 0.8);
            border: 1px solid rgba(139, 184, 255, 0.25);
            color: #fff;
            padding: 0 12px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .uie-world-input-group input:focus {
            border-color: rgba(99, 102, 241, 0.6);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.25);
            outline: none;
        }
        .uie-world-btn {
            height: 42px;
            padding: 0 16px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #06b6d4 0%, #6366f1 100%);
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.2);
        }
        .uie-world-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(6, 182, 212, 0.35);
            filter: brightness(1.1);
        }
        .uie-world-btn:active {
            transform: translateY(0);
        }
        .uie-world-meta-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #94a3b8;
            font-weight: 600;
        }
        .uie-world-meta-badge {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #818cf8;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>

    <div class="uie-header">
        <h2>World Simulation</h2>
        <div style="margin-left: auto; display: flex; gap: 12px; align-items: center;">
            <i class="fa-solid fa-rotate" id="uie-world-update" title="Scan / Update State" style="cursor: pointer; color: #06b6d4; font-size: 1.1em; transition: transform 0.3s ease;"></i>
            <i class="fa-solid fa-xmark uie-close-btn" id="uie-world-close" title="Close Panel"></i>
        </div>
    </div>

    <div class="uie-content">
        <!-- Render target for dynamic state elements -->
        <div id="uie-world-content"></div>

        <!-- World Generator controls -->
        <div class="uie-world-gen-box">
            <div class="uie-world-meta-row">
                <span>SIMULATION ID:</span>
                <span id="uie-world-id" class="uie-world-meta-badge">WAITING...</span>
            </div>
            <div style="font-size: 13px; color: #cbd5e1; font-weight: 600;">
                Change Location / Target Dimension
            </div>
            <div class="uie-world-input-group">
                <input type="text" id="uie-world-input" placeholder="e.g. Neo Tokyo Sector 7, Whispering Woods..." maxlength="80">
                <button type="button" id="uie-world-gen" class="uie-world-btn">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Project
                </button>
            </div>
            <div style="font-size: 11px; color: #64748b; line-height: 1.4;">
                Projecting to a new location triggers Reality Engine environment synthesis and generates a corresponding local backdrop.
            </div>
        </div>
    </div>
    
    <div style="text-align: center; padding: 10px; color: rgba(246, 231, 200, 0.25); font-size: 0.75em; border-top: 1px solid rgba(255, 255, 255, 0.05); font-weight: 700; letter-spacing: 0.5px;">
        REALITY PROJECTION UNIT v3.0
    </div>
</div>
