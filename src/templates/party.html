<style>
  #uie-party-window {
    --party-bg: #07090e;
    --party-panel: rgba(12, 16, 28, 0.88);
    --party-panel-2: rgba(22, 28, 48, 0.72);
    --party-border: rgba(0, 229, 255, 0.22);
    --party-border-glow: rgba(0, 229, 255, 0.08);
    --party-text: #e2e8f0;
    --party-muted: #64748b;
    --party-gold: #d4a84a;
    --party-gold-bright: #fbbf24;
    --party-cyan: #00e5ff;
    --party-magenta: #ff007f;
    --party-green: #10b981;
    --party-red: #ef4444;
    --party-accent-glow: rgba(0, 229, 255, 0.06);
    position: fixed !important;
    inset: 0 !important;
    display: none;
    width: 100vw !important;
    height: 100vh !important;
    max-width: none !important;
    max-height: none !important;
    background:
      radial-gradient(ellipse 80% 50% at 30% 20%, rgba(0, 229, 255, 0.07), transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255, 0, 127, 0.05), transparent 50%),
      linear-gradient(160deg, #05070c 0%, #0c101b 50%, #06080e 100%);
    color: var(--party-text);
    z-index: 2147483632 !important;
    overflow: hidden;
    border: 0 !important;
    border-radius: 0 !important;
    font-family: Outfit, Inter, system-ui, sans-serif;
  }

  #uie-party-window::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(0, 229, 255, 0.015) 79px, rgba(0, 229, 255, 0.015) 80px),
      repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(0, 229, 255, 0.012) 79px, rgba(0, 229, 255, 0.012) 80px);
    pointer-events: none;
    z-index: 0;
  }

  #uie-party-window * { box-sizing: border-box; }
  #uie-party-window button,
  #uie-party-window select,
  #uie-party-window input,
  #uie-party-window textarea {
    font: inherit;
  }

  .party-shell {
    height: 100%;
    display: grid;
    grid-template-columns: 260px minmax(0, 1fr) 96px;
    grid-template-rows: minmax(0, 1fr) 44px;
    min-width: 0;
    position: relative;
    z-index: 1;
  }

  .party-roster-rail,
  .party-nav-rail {
    background: rgba(4, 5, 8, 0.85);
    border-color: rgba(0, 229, 255, 0.15);
  }

  .party-roster-rail {
    grid-column: 1;
    grid-row: 1;
    border-right: 1px solid rgba(0, 229, 255, 0.15);
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    box-shadow: 4px 0 20px rgba(0,0,0,0.5);
  }

  .party-roster-head {
    padding: 14px;
    border-bottom: 1px solid rgba(0, 229, 255, 0.15);
    display: grid;
    gap: 10px;
    background: linear-gradient(180deg, rgba(0, 229, 255, 0.05), transparent);
  }

  .party-title {
    margin: 0;
    font-size: 14px;
    line-height: 1.2;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--party-gold-bright);
    font-weight: 900;
    text-shadow: 0 0 10px rgba(251, 191, 36, 0.35);
  }

  .party-controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .party-icon-btn,
  .party-action-btn,
  .uie-party-tab,
  .party-mini,
  #uie-party-window .reply-tool-btn {
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    border-radius: 4px !important;
    background: linear-gradient(135deg, rgba(20, 26, 44, 0.7), rgba(10, 12, 20, 0.95)) !important;
    color: var(--party-text) !important;
    cursor: pointer !important;
    min-height: 34px;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .party-icon-btn {
    width: 34px;
    display: grid;
    place-items: center;
  }

  .party-action-btn {
    padding: 0 12px;
    font-weight: 900;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .party-icon-btn:hover,
  .party-action-btn:hover,
  .party-mini:hover,
  #uie-party-window .reply-tool-btn:hover {
    border-color: var(--party-cyan) !important;
    background: linear-gradient(135deg, rgba(0, 229, 255, 0.15), rgba(10, 12, 20, 0.95)) !important;
    color: #fff !important;
    box-shadow: 0 0 12px rgba(0, 229, 255, 0.25);
  }

  #party-add-scene-select,
  #uie-party-window select,
  #uie-party-window input,
  #uie-party-window textarea {
    min-width: 0;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    border-radius: 4px !important;
    background: rgba(6, 8, 14, 0.85) !important;
    color: var(--party-text) !important;
    padding: 8px 10px !important;
    font-size: 12px;
  }
  #uie-party-window select:focus,
  #uie-party-window input:focus,
  #uie-party-window textarea:focus {
    border-color: var(--party-cyan) !important;
    outline: none;
    box-shadow: 0 0 8px rgba(0, 229, 255, 0.25);
  }

  .party-roster-list {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 10px;
    display: grid;
    align-content: start;
    gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: rgba(0, 229, 255, 0.2) transparent;
  }

  .party-row {
    display: grid;
    grid-template-columns: 46px minmax(0, 1fr);
    gap: 10px;
    align-items: center;
    min-height: 58px;
    padding: 8px 10px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    background: linear-gradient(135deg, rgba(16, 20, 32, 0.6) 0%, rgba(8, 10, 16, 0.8) 100%);
    cursor: pointer;
    position: relative;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
  }

  .party-row::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: transparent;
    transition: background 0.2s ease;
  }

  .party-row:hover {
    border-color: rgba(0, 229, 255, 0.35);
    background: linear-gradient(135deg, rgba(24, 30, 48, 0.7) 0%, rgba(12, 14, 24, 0.9) 100%);
    transform: translateX(4px);
  }

  .party-row.active {
    border-color: var(--party-cyan);
    background: linear-gradient(135deg, rgba(0, 229, 255, 0.12) 0%, rgba(12, 14, 24, 0.9) 100%);
    box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
  }

  .party-row.active::before {
    background: linear-gradient(180deg, var(--party-cyan), var(--party-magenta));
    box-shadow: 0 0 8px var(--party-cyan);
  }

  .party-row-img-container {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    overflow: hidden;
    display: grid;
    place-items: center;
    background: rgba(4, 5, 8, 0.9);
    border: 2px solid rgba(255, 255, 255, 0.1);
    transition: border-color 0.2s;
  }

  .party-row.active .party-row-img-container {
    border-color: var(--party-cyan);
    box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
  }

  .party-row-name,
  .sheet-name,
  .lane-title,
  .tac-name {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 900;
    font-size: 13px;
    color: var(--party-text);
  }

  .party-row-desc,
  .sheet-details,
  .tac-details,
  .form-mem-details,
  .inv-type {
    color: var(--party-muted);
    font-size: 11px;
    font-weight: 600;
  }

  .party-row-vitals {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-top: 5px;
    width: 100%;
  }
  .party-row-vitals .mini-bar {
    height: 3px;
    background: rgba(0, 0, 0, 0.6);
    border-radius: 1px;
    overflow: hidden;
    position: relative;
  }
  .party-row-vitals .mini-bar .fill {
    height: 100%;
    width: 0%;
    transition: width 0.3s ease;
  }
  .party-row-vitals .mini-bar.hp .fill { background: linear-gradient(90deg, var(--party-red), #ff6b6b); }
  .party-row-vitals .mini-bar.mp .fill { background: linear-gradient(90deg, var(--party-cyan), #73f2ff); }

  .party-workspace {
    grid-column: 2;
    grid-row: 1;
    min-width: 0;
    min-height: 0;
    overflow-y: auto;
    padding: 20px;
    scrollbar-width: thin;
    scrollbar-color: rgba(0, 229, 255, 0.2) transparent;
  }

  #uie-party-body {
    min-width: 0;
    min-height: 100%;
  }

  .party-nav-rail {
    grid-column: 3;
    grid-row: 1 / 3;
    border-left: 1px solid rgba(0, 229, 255, 0.15);
    padding: 20px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    min-width: 0;
    background: linear-gradient(180deg, rgba(8, 10, 16, 0.95), rgba(4, 5, 8, 0.98));
    box-shadow: -4px 0 20px rgba(0,0,0,0.5);
  }

  .uie-party-tab {
    width: 82px;
    height: 58px;
    min-height: 58px;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    text-align: center;
    font-weight: 900;
    border-radius: 4px !important;
    position: relative;
    clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .uie-party-tab span {
    display: block !important;
  }

  .uie-party-tab i {
    font-size: 16px;
  }

  .uie-party-tab.active {
    color: #05070c !important;
    background: linear-gradient(135deg, var(--party-cyan), var(--party-magenta)) !important;
    border-color: var(--party-cyan) !important;
    box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
  }

  .uie-party-tab.active::after {
    content: '';
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 18px;
    background: var(--party-magenta);
    box-shadow: 0 0 8px var(--party-magenta);
  }

  .party-panel,
  .party-inv-row,
  .party-tracker-card,
  .party-form-member,
  .tactics-row,
  .lane-card,
  .stat-card,
  .slot-card {
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 4px;
    background: var(--party-panel);
    position: relative;
  }

  .party-panel {
    padding: 16px;
    background: rgba(10, 15, 30, 0.85) !important;
    backdrop-filter: blur(12px) saturate(1.2) !important;
    border: 1px solid rgba(0, 229, 255, 0.22) !important;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6) !important;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
  }

  .party-panel::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.25), transparent);
  }

  /* MMORPG Skill Tree Board & Branches */
  #uie-party-skilltree-view .uie-skilltree-board {
    position: relative;
    min-height: 520px;
    overflow: auto;
    border: 1px solid rgba(0, 229, 255, 0.2);
    border-radius: 8px;
    background: 
      radial-gradient(circle at center, rgba(16, 24, 48, 0.4) 0%, rgba(5, 7, 12, 0.95) 100%),
      url('assets/ui/generated/party_bg.png') center/cover no-repeat;
    background-blend-mode: multiply;
    padding: 20px;
    -webkit-overflow-scrolling: touch;
  }
  #uie-party-skilltree-view .uie-skilltree-branches {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    width: 100%;
    position: absolute;
    top: 0;
    bottom: 0;
    pointer-events: none;
  }
  #uie-party-skilltree-view .uie-skilltree-branch-label {
    padding: 6px 12px;
    border-radius: 4px;
    border: 1px solid rgba(212, 168, 74, 0.35);
    background: rgba(10, 14, 26, 0.95);
    color: var(--party-gold-bright);
    font-size: 10px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    text-shadow: 0 0 8px rgba(251, 191, 36, 0.35);
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    pointer-events: auto;
  }
  #uie-party-skilltree-view .uie-skill-node {
    width: 90px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    user-select: none;
    z-index: 3;
    transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }
  #uie-party-skilltree-view .uie-skill-node:hover {
    transform: scale(1.1) translateY(-2px);
  }
  #uie-party-skilltree-view .node-medallion {
    width: 58px;
    height: 58px;
    display: grid;
    place-items: center;
    border: 3px solid #334155;
    background: linear-gradient(135deg, rgba(30, 41, 59, 0.95) 0%, rgba(15, 23, 42, 0.98) 100%);
    color: #64748b;
    font-size: 24px;
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.6);
    position: relative;
    border-radius: 10px;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  
  /* Node State Borders */
  #uie-party-skilltree-view .is-locked .node-medallion {
    border-color: #334155 !important;
    color: #475569 !important;
    filter: grayscale(1) brightness(0.6);
  }
  #uie-party-skilltree-view .is-ready .node-medallion {
    border-color: #00e5ff !important;
    color: #00e5ff !important;
    box-shadow: 0 0 15px rgba(0, 229, 255, 0.45);
    animation: skill-ready-glow 1.5s infinite alternate;
  }
  #uie-party-skilltree-view .is-unlocked .node-medallion {
    border-color: #10b981 !important;
    color: #10b981 !important;
    background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(6, 24, 16, 0.95) 100%) !important;
    box-shadow: 0 0 12px rgba(16, 185, 129, 0.3);
  }
  
  #uie-party-skilltree-view .is-locked {
    opacity: 0.55;
  }
  #uie-party-skilltree-view .node-label {
    margin-top: 6px;
    text-align: center;
    width: 110px;
    pointer-events: none;
  }
  #uie-party-skilltree-view .node-name-lbl {
    font-size: 11px;
    font-weight: 850;
    color: #fff;
    line-height: 1.2;
    text-shadow: 0 2px 4px rgba(0,0,0,0.9);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #uie-party-skilltree-view .node-cost-lbl {
    font-size: 9px;
    font-weight: 800;
    color: var(--party-gold-bright);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 1px;
  }
  #uie-party-skilltree-view .node-meta {
    font-size: 9px;
    color: var(--party-muted);
    margin-top: 1px;
  }
  #uie-party-skilltree-view .node-edit-btn {
    position: absolute;
    top: -6px;
    right: -6px;
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 1px solid rgba(0, 229, 255, 0.4) !important;
    background: rgba(4, 5, 8, 0.95) !important;
    color: var(--party-cyan) !important;
    display: grid;
    place-items: center;
    font-size: 9px;
    cursor: pointer;
    padding: 0 !important;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #uie-party-skilltree-view .uie-skill-node:hover .node-edit-btn {
    opacity: 1;
  }
  @media not all {
    #uie-party-skilltree-view { padding: 10px; }
    #uie-party-skilltree-view .uie-skilltree-head { align-items: flex-start !important; }
    #uie-party-skilltree-view .uie-skilltree-board { max-height: 58vh; }
    #uie-party-skilltree-view .uie-skill-node { width: 150px; min-height: 82px; }
  }

  .sheet-grid,
  .stats-grid,
  .gear-grid,
  .party-inv-list,
  .tactics-list,
  .formation-lanes {
    display: grid;
    gap: 12px;
  }

  /* Stacked Stats + Trackers Right Column, full doll Left Column Layout */
  .sheet-grid {
    grid-template-columns: minmax(200px, 2fr) 3fr;
    gap: 20px;
    align-items: stretch;
    min-height: calc(100vh - 140px);
  }

  .sheet-left {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
    position: relative;
  }

  .sheet-portrait-frame {
    width: 100%;
    flex: 1 1 auto;
    min-height: 300px;
    max-height: none;
    border: none;
    background: transparent;
    box-shadow: none;
    clip-path: none;
    position: relative;
    overflow: visible;
    display: flex;
    align-items: stretch;
    justify-content: center;
  }

  .sheet-portrait {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: stretch;
    justify-content: center;
  }

  .sheet-portrait img,
  .sheet-portrait .party-avatar-safe {
    width: 100% !important;
    height: 100% !important;
    object-fit: contain !important;
    object-position: center bottom;
  }

  .sheet-portrait-zoom {
    position: absolute;
    bottom: 12px;
    right: 12px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2) !important;
    background: rgba(0,0,0,0.6) !important;
    color: #fff !important;
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 10;
  }
  .sheet-portrait-zoom:hover {
    transform: scale(1.1);
    color: var(--party-cyan) !important;
    border-color: var(--party-cyan) !important;
    box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
  }

  .sheet-right {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(0, 229, 255, 0.2) transparent;
    padding-right: 8px;
    -webkit-overflow-scrolling: touch;
  }
  .sheet-right::-webkit-scrollbar {
    width: 6px;
  }
  .sheet-right::-webkit-scrollbar-track {
    background: transparent;
  }
  .sheet-right::-webkit-scrollbar-thumb {
    background: rgba(0, 229, 255, 0.25);
    border-radius: 3px;
  }
  .sheet-right::-webkit-scrollbar-thumb:hover {
    background: rgba(0, 229, 255, 0.45);
  }

  .sheet-header-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: linear-gradient(135deg, rgba(20, 24, 40, 0.9) 0%, rgba(8, 10, 16, 0.95) 100%);
    border: 1px solid rgba(0, 229, 255, 0.2);
    clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 15px 100%, 0 calc(100% - 15px));
  }

  .sheet-name {
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
  }

  .sheet-details {
    font-size: 11px;
    color: var(--party-muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }

  .sheet-vitals-compact {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    flex: 1;
    justify-content: flex-end;
    max-width: 480px;
  }

  .sheet-vital-bar {
    width: 100px;
    flex: 0 0 100px;
    padding: 6px;
    border-radius: 4px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    background: rgba(0, 0, 0, 0.3);
    position: relative;
    overflow: hidden;
  }

  .sheet-vital-bar .bar-lbl {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--party-muted);
    font-weight: 900;
  }

  .sheet-vital-bar .bar-text {
    font-size: 11px;
    margin-top: 1px;
    font-weight: 900;
    color: #fff;
  }

  .sheet-vital-bar .bar-track {
    height: 4px;
    margin-top: 4px;
    border-radius: 1px;
    background: rgba(0, 0, 0, 0.6);
  }

  .sheet-stats-card,
  .sheet-trackers-card,
  .sheet-bio-card {
    padding: 16px;
    background: linear-gradient(135deg, rgba(12, 15, 26, 0.9) 0%, rgba(6, 8, 12, 0.95) 100%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 900;
    color: var(--party-gold);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    padding-bottom: 8px;
    margin-bottom: 12px;
  }

  .vitals-section,
  .stats-grid {
    grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
  }

  .stat-card,
  .vital-card {
    padding: 8px 10px;
