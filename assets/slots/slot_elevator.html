<div class="uie-slot-elevator" role="group" aria-label="Elevator floor panel">
  <style>
    .uie-slot-elevator {
      width: min(260px, 100%);
      padding: 14px;
      border: 1px solid rgba(202, 213, 225, 0.28);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(31, 41, 55, 0.94), rgba(8, 13, 23, 0.96)),
        radial-gradient(circle at 50% 0%, rgba(251, 191, 36, 0.18), transparent 48%);
      box-shadow: inset 0 1px rgba(255, 255, 255, 0.12), 0 18px 42px rgba(0, 0, 0, 0.42);
      color: #e5e7eb;
      font-family: Inter, system-ui, sans-serif;
    }
    .uie-slot-elevator__screen {
      min-height: 42px;
      display: grid;
      place-items: center;
      margin-bottom: 12px;
      border: 1px solid rgba(251, 191, 36, 0.38);
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.42);
      color: #fbbf24;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }
    .uie-slot-elevator__buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .uie-slot-elevator button {
      min-height: 42px;
      border: 1px solid rgba(226, 232, 240, 0.22);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(51, 65, 85, 0.92), rgba(15, 23, 42, 0.92));
      color: #f8fafc;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }
    .uie-slot-elevator button:hover,
    .uie-slot-elevator button:focus {
      border-color: rgba(251, 191, 36, 0.58);
      outline: none;
      color: #fef3c7;
    }
  </style>
  <div class="uie-slot-elevator__screen" data-elevator-readout>FLOOR 1</div>
  <div class="uie-slot-elevator__buttons">
    <button type="button" data-elevator-floor="B1">B1</button>
    <button type="button" data-elevator-floor="1">1</button>
    <button type="button" data-elevator-floor="2">2</button>
    <button type="button" data-elevator-floor="3">3</button>
    <button type="button" data-elevator-floor="4">4</button>
    <button type="button" data-elevator-floor="R">R</button>
  </div>
</div>
